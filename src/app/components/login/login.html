<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <h1>Admin Panel</h1>
      <p>Login</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="login-form">
      <div class="field-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
          email
          #emailField="ngModel"
        />
        <div class="field-error" [class.visible]="emailField.invalid && emailField.touched">
          <span *ngIf="emailField.errors?.['required']">Email is required.</span>
          <span *ngIf="emailField.errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div class="field-group password-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required
            #passwordField="ngModel"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="!showPassword">
              <path d="M12 5c-4.9 0-8.9 3.2-10 7 1.1 3.8 5.1 7 10 7s8.9-3.2 10-7c-1.1-3.8-5.1-7-10-7Zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5Zm0-8a3 3 0 1 0 .001 6.001A3 3 0 0 0 12 9Z" fill="currentColor" />
            </svg>
            <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="showPassword">
              <path d="M12 5c-4.9 0-8.9 3.2-10 7 1.1 3.8 5.1 7 10 7s8.9-3.2 10-7c-1.1-3.8-5.1-7-10-7Zm0 12c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5Zm0-8a3 3 0 1 0 .001 6.001A3 3 0 0 0 12 9Z" fill="currentColor" />
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="field-error" [class.visible]="passwordField.invalid && passwordField.touched">
          <span *ngIf="passwordField.errors?.['required']">Password is required.</span>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    
  </div>
</div>
